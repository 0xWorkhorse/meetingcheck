<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>meetingcheck — strict meeting link verifier</title>
    <meta name="description" content="A strict link verifier for meeting invites. Is this actually Zoom, Meet, or Calendly? Built for crypto after the Feb 2026 fake-Zoom wave." />
    <meta property="og:title" content="meetingcheck" />
    <meta property="og:description" content="Strict meeting-link verifier. Paste a link, get a binary verdict." />
    <meta property="og:url" content="https://meetingcheck.io" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <script>
      (function () {
        try {
          var s = localStorage.getItem('mc-theme');
          var t = s === 'dark' || s === 'light'
            ? s
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', t);
        } catch (_) {}
      })();
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body class="bg-paper text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

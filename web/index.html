    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Meetingcheck",
        "url": "https://meetingcheck.io/",
        "description": "Strict verifier for Zoom, Meet, Teams, and Calendly meeting links.",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0" }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    />

    <!-- Pre-hydration theme: dark by default, respects saved light preference. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('mc-theme');
          var t = s === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Cloudflare Turnstile (report form) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body class="bg-paper text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

name = "isthislinksafe-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Public routes (configure in Cloudflare dashboard once the zone is set up):
# route = { pattern = "api.isthislinksafe.com/*", zone_name = "isthislinksafe.com" }

[vars]
ENVIRONMENT = "production"
# TURNSTILE_SITEKEY is public and safe to commit.
TURNSTILE_SITEKEY = ""
# TURNSTILE_SECRET and ADMIN_TOKEN are set via: wrangler secret put <NAME>

[[d1_databases]]
binding = "DB"
database_name = "isthislinksafe"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[observability]
enabled = true
